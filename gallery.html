<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery - My Daily Journal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="icon" href="img/logo.png" />
    <style>
      /* Palette Biru Estetik */
      :root {
        --bg-blue: #f0f7ff; 
        --accent-blue: #5a91cc; 
        --deep-blue: #2c3e50; 
      }
      body { 
        background-color: var(--bg-blue); 
        color: var(--deep-blue);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      }
      /* Navbar Biru */
      .navbar { background-color: var(--accent-blue) !important; }
      
      /* Carousel Styling Estetik - Menggunakan contoh paling atas sesuai instruksi */
      .carousel {
        border: 10px solid #ffffff;
        box-shadow: 0 15px 35px rgba(90, 145, 204, 0.2);
        border-radius: 20px;
        overflow: hidden;
      }
      .carousel-item img {
        height: 500px;
        object-fit: cover;
      }
      /* Footer */
      .footer { background-color: #ffffff; }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-journal-bookmark-fill me-2"></i>MY JOURNAL.</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link text-white" href="index.html">HOME</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="article.html">ARTICLE</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="gallery.html">GALLERY</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <section id="gallery" class="py-5">
      <div class="container">
        <h1 class="text-center fw-bold mb-5 display-4">MY GALLERY</h1>
        
        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="img/UDIN.jpeg" class="d-block w-100" alt="UDIN 1">
            </div>
            <div class="carousel-item">
              <img src="img/UDIN 2.jpeg" class="d-block w-100" alt="UDIN 2">
            </div>
            <div class="carousel-item">
              <img src="img/UDIN 3.jpeg" class="d-block w-100" alt="UDIN 3">
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>
    </section>

    <footer class="text-center py-5 border-top" style="background-color: #ffffff;">
      <div class="container">
        <div class="mb-3">
          <a href="#" class="h2 p-2 text-primary"><i class="bi bi-instagram"></i></a>
          <a href="#" class="h2 p-2 text-info"><i class="bi bi-twitter"></i></a>
          <a href="#" class="h2 p-2 text-success"><i class="bi bi-whatsapp"></i></a>
        </div>
        <div>
          <p class="fw-bold text-muted">Nadya_A18.2025.00200 &copy; 2026</p>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
